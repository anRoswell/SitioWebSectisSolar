name: CI/CD - Build and Deploy Sitio Web

on:
  push:
    branches:
      - master

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # ghcr.io/anroswell/conjunto-os-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject Build Info
        run: |
          echo "{\"buildNumber\": \"${{ github.run_number }}\", \"buildDate\": \"$(date +'%Y-%m-%d %H:%M:%S')\"}" > public/version.json

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: . # Tu Dockerfile de Angular debe estar en la raíz de este repo
          file: .dockerfile
          push: true
          tags: ghcr.io/anroswell/SitioWebSectisSolar:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Executing remote ssh commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd ~/postgres-app
            # 1. Iniciar sesión en el registro desde el VPS
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 2. Descargar solo la nueva imagen del frontend y reiniciar el contenedor
            docker compose pull frontend
            docker compose up -d frontend
