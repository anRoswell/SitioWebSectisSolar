name: CI/CD - Build and Deploy Sitio Web SectisSolar

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - 'README.md'
      - '.gitignore'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/sitiowebsectissolar

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject Build Info
        run: |
          echo "{\"buildNumber\": \"${{ github.run_number }}\", \"buildDate\": \"$(date +'%Y-%m-%d %H:%M:%S')\"}" > assets/version.json

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push SitioWeb Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/anroswell/sitiowebsectissolar:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Executing remote SSH commands on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd ~/postgres-app
            # 1. Iniciar sesión en el registro
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 2. Descargar solo la nueva imagen del sitio web y reiniciar el contenedor
            docker compose pull sitioweb
            docker compose up -d sitioweb
            docker system prune -f
